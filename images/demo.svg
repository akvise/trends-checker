<svg xmlns="http://www.w3.org/2000/svg" width="700" height="440" viewBox="0 0 700 440">
  <defs>
    <style>
      .terminal { font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size: 13px; }
      .bg { fill: #1e1e2e; }
      .titlebar { fill: #313244; }
      .dot-red { fill: #f38ba8; }
      .dot-yellow { fill: #f9e2af; }
      .dot-green { fill: #a6e3a1; }
      .prompt { fill: #50fa7b; }
      .cmd { fill: #cdd6f4; }
      .header { fill: #f1fa8c; }
      .border { fill: #6c7086; }
      .data { fill: #cdd6f4; }
      .rising { fill: #a6e3a1; }
      .dim { fill: #585b70; }
      .spark-high { fill: #a6e3a1; }
      .spark-mid { fill: #f9e2af; }
      .spark-low { fill: #6c7086; }

      .line1 { animation: fadein 0.3s ease forwards; animation-delay: 0.2s; opacity: 0; }
      .line2 { animation: fadein 0.3s ease forwards; animation-delay: 0.8s; opacity: 0; }
      .line3 { animation: fadein 0.3s ease forwards; animation-delay: 1.1s; opacity: 0; }
      .line4 { animation: fadein 0.3s ease forwards; animation-delay: 1.4s; opacity: 0; }
      .line5 { animation: fadein 0.3s ease forwards; animation-delay: 1.7s; opacity: 0; }
      .line6 { animation: fadein 0.3s ease forwards; animation-delay: 2.0s; opacity: 0; }
      .line7 { animation: fadein 0.3s ease forwards; animation-delay: 2.3s; opacity: 0; }
      .line8 { animation: fadein 0.3s ease forwards; animation-delay: 2.6s; opacity: 0; }
      .line9 { animation: fadein 0.3s ease forwards; animation-delay: 2.9s; opacity: 0; }
      .line10 { animation: fadein 0.3s ease forwards; animation-delay: 3.2s; opacity: 0; }
      .line11 { animation: fadein 0.3s ease forwards; animation-delay: 3.5s; opacity: 0; }
      .line12 { animation: fadein 0.3s ease forwards; animation-delay: 3.8s; opacity: 0; }
      .line13 { animation: fadein 0.3s ease forwards; animation-delay: 4.1s; opacity: 0; }
      .line14 { animation: fadein 0.3s ease forwards; animation-delay: 4.4s; opacity: 0; }
      .cursor { animation: blink 1s step-end infinite; animation-delay: 0.5s; }

      @keyframes fadein {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="700" height="440" rx="10" ry="10" class="bg"/>

  <!-- Title bar -->
  <rect width="700" height="36" rx="10" ry="10" class="titlebar"/>
  <rect y="18" width="700" height="18" class="titlebar"/>
  <circle cx="20" cy="18" r="6" class="dot-red"/>
  <circle cx="40" cy="18" r="6" class="dot-yellow"/>
  <circle cx="60" cy="18" r="6" class="dot-green"/>
  <text x="350" y="23" text-anchor="middle" class="terminal dim" font-size="12">trends-checker — bash</text>

  <!-- Terminal content -->
  <g class="terminal">

    <!-- Line 1: prompt + command -->
    <g class="line1">
      <text x="20" y="66" class="prompt">❯</text>
      <text x="34" y="66" class="cmd">trends-checker --keywords </text>
      <text x="234" y="66" class="rising">"AI agents,vibe coding,cursor ide"</text>
      <text x="468" y="66" class="cmd"> --geo US</text>
    </g>

    <!-- Line 2: blank + fetching -->
    <g class="line2">
      <text x="20" y="86" class="dim">Fetching trends via DataForSEO… (3 keywords × 1 region)</text>
    </g>

    <!-- Line 3: separator -->
    <g class="line3">
      <text x="20" y="110" class="border">┌──────────────────────┬────────┬──────────┬────────────┬──────────┐</text>
    </g>

    <!-- Line 4: header -->
    <g class="line4">
      <text x="20" y="128" class="border">│</text>
      <text x="28" y="128" class="header"> Keyword              </text>
      <text x="188" y="128" class="border">│</text>
      <text x="196" y="128" class="header"> Region </text>
      <text x="254" y="128" class="border">│</text>
      <text x="262" y="128" class="header"> Interest </text>
      <text x="326" y="128" class="border">│</text>
      <text x="334" y="128" class="header"> Sparkline  </text>
      <text x="412" y="128" class="border">│</text>
      <text x="420" y="128" class="header"> Trend    </text>
      <text x="480" y="128" class="border">│</text>
    </g>

    <!-- Line 5: separator -->
    <g class="line5">
      <text x="20" y="146" class="border">├──────────────────────┼────────┼──────────┼────────────┼──────────┤</text>
    </g>

    <!-- Line 6: AI agents -->
    <g class="line6">
      <text x="20" y="164" class="border">│</text>
      <text x="28" y="164" class="data"> AI agents            </text>
      <text x="188" y="164" class="border">│</text>
      <text x="196" y="164" class="data"> US     </text>
      <text x="254" y="164" class="border">│</text>
      <text x="262" y="164" class="data">       87 </text>
      <text x="326" y="164" class="border">│</text>
      <text x="334" y="164">
        <tspan class="spark-low">░░</tspan><tspan class="spark-mid">▓▓</tspan><tspan class="spark-high">███</tspan><tspan class="spark-high">█</tspan>
      </text>
      <text x="412" y="164" class="border">│</text>
      <text x="420" y="164" class="rising"> ↑ rising </text>
      <text x="480" y="164" class="border">│</text>
    </g>

    <!-- Line 7: vibe coding -->
    <g class="line7">
      <text x="20" y="182" class="border">│</text>
      <text x="28" y="182" class="data"> vibe coding          </text>
      <text x="188" y="182" class="border">│</text>
      <text x="196" y="182" class="data"> US     </text>
      <text x="254" y="182" class="border">│</text>
      <text x="262" y="182" class="data">       74 </text>
      <text x="326" y="182" class="border">│</text>
      <text x="334" y="182">
        <tspan class="dim">░</tspan><tspan class="spark-low">░</tspan><tspan class="spark-mid">▓▓▓</tspan><tspan class="spark-high">██</tspan><tspan class="spark-high">█</tspan>
      </text>
      <text x="412" y="182" class="border">│</text>
      <text x="420" y="182" class="rising"> ↑ rising </text>
      <text x="480" y="182" class="border">│</text>
    </g>

    <!-- Line 8: cursor ide -->
    <g class="line8">
      <text x="20" y="200" class="border">│</text>
      <text x="28" y="200" class="data"> cursor ide           </text>
      <text x="188" y="200" class="border">│</text>
      <text x="196" y="200" class="data"> US     </text>
      <text x="254" y="200" class="border">│</text>
      <text x="262" y="200" class="data">       61 </text>
      <text x="326" y="200" class="border">│</text>
      <text x="334" y="200">
        <tspan class="dim">░</tspan><tspan class="spark-low">░░</tspan><tspan class="spark-mid">▓▓</tspan><tspan class="spark-high">██</tspan><tspan class="spark-mid">▓</tspan>
      </text>
      <text x="412" y="200" class="border">│</text>
      <text x="420" y="200" class="rising"> ↑ rising </text>
      <text x="480" y="200" class="border">│</text>
    </g>

    <!-- Line 9: separator -->
    <g class="line9">
      <text x="20" y="218" class="border">├──────────────────────┼────────┼──────────┼────────────┼──────────┤</text>
    </g>

    <!-- Line 10: WW rows -->
    <g class="line10">
      <text x="20" y="236" class="border">│</text>
      <text x="28" y="236" class="dim"> AI agents            </text>
      <text x="188" y="236" class="border">│</text>
      <text x="196" y="236" class="dim"> WW     </text>
      <text x="254" y="236" class="border">│</text>
      <text x="262" y="236" class="dim">       92 </text>
      <text x="326" y="236" class="border">│</text>
      <text x="334" y="236">
        <tspan class="spark-low">░</tspan><tspan class="spark-mid">▓</tspan><tspan class="spark-high">███</tspan><tspan class="spark-high">███</tspan>
      </text>
      <text x="412" y="236" class="border">│</text>
      <text x="420" y="236" class="rising"> ↑ rising </text>
      <text x="480" y="236" class="border">│</text>
    </g>

    <!-- Line 11 -->
    <g class="line11">
      <text x="20" y="254" class="border">│</text>
      <text x="28" y="254" class="dim"> vibe coding          </text>
      <text x="188" y="254" class="border">│</text>
      <text x="196" y="254" class="dim"> WW     </text>
      <text x="254" y="254" class="border">│</text>
      <text x="262" y="254" class="dim">       68 </text>
      <text x="326" y="254" class="border">│</text>
      <text x="334" y="254">
        <tspan class="dim">░░</tspan><tspan class="spark-low">░</tspan><tspan class="spark-mid">▓▓</tspan><tspan class="spark-high">███</tspan>
      </text>
      <text x="412" y="254" class="border">│</text>
      <text x="420" y="254" class="rising"> ↑ rising </text>
      <text x="480" y="254" class="border">│</text>
    </g>

    <!-- Line 12 -->
    <g class="line12">
      <text x="20" y="272" class="border">│</text>
      <text x="28" y="272" class="dim"> cursor ide           </text>
      <text x="188" y="272" class="border">│</text>
      <text x="196" y="272" class="dim"> WW     </text>
      <text x="254" y="272" class="border">│</text>
      <text x="262" y="272" class="dim">       55 </text>
      <text x="326" y="272" class="border">│</text>
      <text x="334" y="272">
        <tspan class="dim">░░░</tspan><tspan class="spark-low">░</tspan><tspan class="spark-mid">▓▓</tspan><tspan class="spark-high">██</tspan>
      </text>
      <text x="412" y="272" class="border">│</text>
      <text x="420" y="272" class="spark-mid"> → stable </text>
      <text x="480" y="272" class="border">│</text>
    </g>

    <!-- Line 13: bottom border -->
    <g class="line13">
      <text x="20" y="290" class="border">└──────────────────────┴────────┴──────────┴────────────┴──────────┘</text>
    </g>

    <!-- Line 14: summary -->
    <g class="line14">
      <text x="20" y="316" class="dim">6 results · Google Trends (web) · timeframe: today 12-m · 0.8s</text>
    </g>

    <!-- Cursor -->
    <g class="line14">
      <text x="20" y="346" class="prompt">❯</text>
      <rect x="34" y="333" width="8" height="15" class="prompt cursor"/>
    </g>

  </g>

  <!-- Footer hint -->
  <text x="350" y="420" text-anchor="middle" class="terminal dim" font-size="11">
    No 429s · pip install trends-checker · trendproof.dev for velocity API
  </text>
</svg>
