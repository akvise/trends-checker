<svg xmlns="http://www.w3.org/2000/svg" xmlns:xhtml="http://www.w3.org/1999/xhtml" width="700" height="460" viewBox="0 0 700 460">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .titlebar { fill: #313244; }
      .dot-red { fill: #f38ba8; }
      .dot-yellow { fill: #f9e2af; }
      .dot-green { fill: #a6e3a1; }

      .line1  { animation: fadein 0.3s ease forwards; animation-delay: 0.2s; opacity: 0; }
      .line2  { animation: fadein 0.3s ease forwards; animation-delay: 0.7s; opacity: 0; }
      .line3  { animation: fadein 0.3s ease forwards; animation-delay: 1.0s; opacity: 0; }
      .line4  { animation: fadein 0.3s ease forwards; animation-delay: 1.3s; opacity: 0; }
      .line5  { animation: fadein 0.3s ease forwards; animation-delay: 1.6s; opacity: 0; }
      .line6  { animation: fadein 0.3s ease forwards; animation-delay: 1.9s; opacity: 0; }
      .line7  { animation: fadein 0.3s ease forwards; animation-delay: 2.2s; opacity: 0; }
      .line8  { animation: fadein 0.3s ease forwards; animation-delay: 2.5s; opacity: 0; }
      .line9  { animation: fadein 0.3s ease forwards; animation-delay: 2.8s; opacity: 0; }
      .line10 { animation: fadein 0.3s ease forwards; animation-delay: 3.1s; opacity: 0; }
      .line11 { animation: fadein 0.3s ease forwards; animation-delay: 3.4s; opacity: 0; }
      .line12 { animation: fadein 0.3s ease forwards; animation-delay: 3.7s; opacity: 0; }
      .line13 { animation: fadein 0.3s ease forwards; animation-delay: 4.0s; opacity: 0; }
      .line14 { animation: fadein 0.3s ease forwards; animation-delay: 4.3s; opacity: 0; }
      .line15 { animation: fadein 0.3s ease forwards; animation-delay: 4.6s; opacity: 0; }
      .cursor { animation: blink 1s step-end infinite; }

      @keyframes fadein {
        from { opacity: 0; transform: translateY(3px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      pre {
        font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
        font-size: 13px;
        line-height: 1.5;
        margin: 0;
        padding: 0;
        white-space: pre;
      }
      .c-prompt  { color: #50fa7b; }
      .c-cmd     { color: #cdd6f4; }
      .c-str     { color: #f1fa8c; }
      .c-dim     { color: #6c7086; }
      .c-header  { color: #f1fa8c; }
      .c-border  { color: #585b70; }
      .c-data    { color: #cdd6f4; }
      .c-rising  { color: #a6e3a1; }
      .c-stable  { color: #f9e2af; }
      .c-spark-h { color: #a6e3a1; }
      .c-spark-m { color: #f9e2af; }
      .c-spark-l { color: #45475a; }
    </style>
  </defs>

  <!-- Window background -->
  <rect width="700" height="460" rx="10" ry="10" class="bg"/>

  <!-- Title bar -->
  <rect width="700" height="36" rx="10" ry="10" class="titlebar"/>
  <rect y="18" width="700" height="18" class="titlebar"/>
  <circle cx="20" cy="18" r="6" class="dot-red"/>
  <circle cx="40" cy="18" r="6" class="dot-yellow"/>
  <circle cx="60" cy="18" r="6" class="dot-green"/>
  <text x="350" y="23" text-anchor="middle"
        font-family="'Cascadia Code','Fira Code','Courier New',monospace"
        font-size="12" fill="#6c7086">trends-checker — bash</text>

  <!-- Terminal content via foreignObject for pixel-perfect monospace -->
  <foreignObject x="16" y="44" width="668" height="400">
    <xhtml:div xmlns="http://www.w3.org/1999/xhtml">

      <pre class="line1"><span class="c-prompt">❯ </span><span class="c-cmd">trends-checker --keywords </span><span class="c-str">"AI agents,vibe coding,cursor ide"</span><span class="c-cmd"> --geo US</span></pre>

      <pre class="line2"><span class="c-dim">Fetching trends via DataForSEO… (3 keywords × 1 region)</span></pre>

      <pre class="line3"><span class="c-border">┌──────────────────────┬────────┬──────────┬────────────┬──────────┐</span></pre>

      <pre class="line4"><span class="c-border">│</span><span class="c-header"> Keyword              </span><span class="c-border">│</span><span class="c-header"> Region </span><span class="c-border">│</span><span class="c-header"> Interest </span><span class="c-border">│</span><span class="c-header"> Sparkline  </span><span class="c-border">│</span><span class="c-header"> Trend    </span><span class="c-border">│</span></pre>

      <pre class="line5"><span class="c-border">├──────────────────────┼────────┼──────────┼────────────┼──────────┤</span></pre>

      <pre class="line6"><span class="c-border">│</span><span class="c-data"> AI agents            </span><span class="c-border">│</span><span class="c-data"> US     </span><span class="c-border">│</span><span class="c-data">       87 </span><span class="c-border">│</span><span class="c-data"> </span><span class="c-spark-l">░░</span><span class="c-spark-m">▓▓</span><span class="c-spark-h">████</span><span class="c-data"> </span><span class="c-border">│</span><span class="c-rising"> ↑ rising </span><span class="c-border">│</span></pre>

      <pre class="line7"><span class="c-border">│</span><span class="c-data"> vibe coding          </span><span class="c-border">│</span><span class="c-data"> US     </span><span class="c-border">│</span><span class="c-data">       74 </span><span class="c-border">│</span><span class="c-data"> </span><span class="c-spark-l">░</span><span class="c-spark-m">▓▓▓</span><span class="c-spark-h">███</span><span class="c-spark-m">▓</span><span class="c-data"> </span><span class="c-border">│</span><span class="c-rising"> ↑ rising </span><span class="c-border">│</span></pre>

      <pre class="line8"><span class="c-border">│</span><span class="c-data"> cursor ide           </span><span class="c-border">│</span><span class="c-data"> US     </span><span class="c-border">│</span><span class="c-data">       61 </span><span class="c-border">│</span><span class="c-data"> </span><span class="c-spark-l">░░</span><span class="c-spark-m">▓▓▓</span><span class="c-spark-h">██</span><span class="c-spark-m">▓</span><span class="c-data"> </span><span class="c-border">│</span><span class="c-rising"> ↑ rising </span><span class="c-border">│</span></pre>

      <pre class="line9"><span class="c-border">├──────────────────────┼────────┼──────────┼────────────┼──────────┤</span></pre>

      <pre class="line10"><span class="c-border">│</span><span class="c-dim"> AI agents            </span><span class="c-border">│</span><span class="c-dim"> WW     </span><span class="c-border">│</span><span class="c-dim">       92 </span><span class="c-border">│</span><span class="c-dim"> </span><span class="c-spark-l">░</span><span class="c-spark-m">▓</span><span class="c-spark-h">██████</span><span class="c-dim"> </span><span class="c-border">│</span><span class="c-rising"> ↑ rising </span><span class="c-border">│</span></pre>

      <pre class="line11"><span class="c-border">│</span><span class="c-dim"> vibe coding          </span><span class="c-border">│</span><span class="c-dim"> WW     </span><span class="c-border">│</span><span class="c-dim">       68 </span><span class="c-border">│</span><span class="c-dim"> </span><span class="c-spark-l">░░</span><span class="c-spark-m">▓▓▓</span><span class="c-spark-h">███</span><span class="c-dim"> </span><span class="c-border">│</span><span class="c-rising"> ↑ rising </span><span class="c-border">│</span></pre>

      <pre class="line12"><span class="c-border">│</span><span class="c-dim"> cursor ide           </span><span class="c-border">│</span><span class="c-dim"> WW     </span><span class="c-border">│</span><span class="c-dim">       55 </span><span class="c-border">│</span><span class="c-dim"> </span><span class="c-spark-l">░░░</span><span class="c-spark-m">▓▓▓</span><span class="c-spark-h">██</span><span class="c-dim"> </span><span class="c-border">│</span><span class="c-stable"> → stable </span><span class="c-border">│</span></pre>

      <pre class="line13"><span class="c-border">└──────────────────────┴────────┴──────────┴────────────┴──────────┘</span></pre>

      <pre class="line14"><span class="c-dim">6 results · Google Trends (web) · timeframe: today 12-m · 0.8s</span></pre>

      <pre class="line15"><span class="c-prompt">❯ </span><span class="c-prompt cursor">█</span></pre>

    </xhtml:div>
  </foreignObject>

  <!-- Footer -->
  <text x="350" y="442" text-anchor="middle"
        font-family="'Cascadia Code','Fira Code','Courier New',monospace"
        font-size="11" fill="#45475a">No 429s · pip install trends-checker · trendproof.dev for velocity API</text>
</svg>
